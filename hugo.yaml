# Hugo configuration file
title: Collab Codes Blog

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: Home ↗
      url: "https://www.collab.codes"
      weight: 1
    - name: Search
      weight: 2
      params:
        type: search
    - name: GitHub
      weight: 3
      url: "https://github.com/collab-codes/collab-blog-hextra"
      params:
        icon: github
    - name: Twitter
      weight: 4
      url: "https://twitter.com/"
      params:
        icon: x-twitter

params:
  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    displayCopyright: false
    displayPoweredBy: true

  editURL:
    enable: true
    base: "https://github.com/collab-codes/collab-blog-hextra/edit/main/content"

  title: "collab.codes Blog"

  # Tema (light/dark/system)
  theme:
    default: system
    displayToggle: true

  showSearch: true
  showToc: true
  showLastUpdated: true
