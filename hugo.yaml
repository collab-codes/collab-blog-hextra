title: Collab Codes Blog
baseURL: "https://blog.collab.codes"

module:
  imports:
    - path: github.com/adityatelange/hugo-PaperMod

defaultContentLanguage: "en"
defaultContentLanguageInSubdir: false

languages:
  en:
    languageName: "English"
    weight: 1
    contentDir: content/en
    params:
      homeInfoParams:
        Title: "Collab.codes Blog"
        Content: >
          Articles, technical insights and product updates
          from the team building the next generation of enterprise software with AI.
    menu:
      main:
        - name: Blog
          url: /blog/
          weight: 1
        - name: Search
          url: /search/
          weight: 2
        - name: collab.codes
          url: "https://www.collab.codes"
          weight: 3
          params:
            target: "_blank"
  pt:
    languageName: "Português"
    weight: 2
    contentDir: content/pt
    params:
      homeInfoParams:
        Title: "Blog Collab.codes"
        Content: >
          Artigos, insights técnicos e atualizações de produto
          da equipe que está construindo a próxima geração de software empresarial com IA.
    menu:
      main:
        - name: Blog
          url: /pt/blog/
          weight: 1
        - name: Busca
          url: /pt/search/
          weight: 2
        - name: collab.codes
          url: "https://www.collab.codes"
          weight: 3
          params:
            target: "_blank"

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    style: github

params:
  env: production
  author: "Collab.codes Team"
  description: "Articles, insights and knowledge from the Collab.codes team"
  defaultTheme: light
  disableThemeToggle: false
  displayFullLangName: true

  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: false
  ShowAllPagesInArchive: true
  ShowPageNums: true
  ShowToc: false
  TocOpen: false

  mainSections: ["blog"]

  socialIcons:
    - name: github
      url: "https://github.com/collab-codes"
    - name: twitter
      url: "https://twitter.com/"

  editPost:
    URL: "https://github.com/collab-codes/collab-blog-hextra/edit/main/content"
    Text: "Edit on GitHub"
    appendFilePath: true

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]
