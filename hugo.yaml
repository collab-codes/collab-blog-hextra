# Hugo configuration file
title: Collab Codes Blog

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

params:
  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    displayCopyright: false
    displayPoweredBy: false

  editURL:
    enable: true
    base: "https://github.com/collab-codes/collab-blog-hextra/edit/main/content"

    # Tema (light/dark/system)
  theme:
    default: system
    displayToggle: true

  showSearch: true
  showToc: true
  showLastUpdated: true

menu:
  main:
    - name: Home
      url: "https://www.collab.codes"
      weight: 1
      params:
        target: "_self"      
    - name: Docs
      url: "https://docs.collab.codes"
      weight: 2
      params:
        target: "_self"      
    - name: Blog
      url: https://blog.collab.codes
      weight: 3
      params:
        target: "_self"
    - name: Search
      weight: 4
      params:
        type: search
    - name: GitHub
      weight: 5
      url: "https://github.com/collab-codes/collab-blog-hextra"
      params:
        icon: github
    - name: Twitter
      weight: 6
      url: "https://twitter.com/"
      params:
        icon: x-twitter
