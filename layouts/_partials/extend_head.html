<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400;1,8..60,600&display=swap" rel="stylesheet">
{{ if and .IsHome (eq .Site.Language.Lang "en") }}
<script>
  (function () {
    var path = window.location.pathname;
    if (path !== "/" && path !== "") return;
    var languages = navigator.languages && navigator.languages.length
      ? navigator.languages
      : [navigator.language || navigator.userLanguage || ""];
    var prefersPortuguese = languages.some(function (language) {
      return String(language).toLowerCase().startsWith("pt");
    });
    if (prefersPortuguese) {
      window.location.replace("/pt/");
    }
  }());
</script>
{{ end }}
